<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌍 Temakväll Liga</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(#fef3c7, #fde68a);
  padding: 20px;
}
h1 { text-align:center; }

.box {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  width:100%;
  padding:12px;
  background:#f97316;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.winner {
  background:#dcfce7;
  border:2px solid green;
}
</style>

</head>

<body>

<h1>🌍 Temakväll Liga</h1>

<div class="box">
<input id="title" placeholder="Tema (t.ex. Italien)">
<input id="host" placeholder="Vem arrangerade?">
<input id="name" placeholder="Ditt namn">

<input id="taste" type="number" min="1" max="5" placeholder="Smak (1-5)">
<input id="theme" type="number" min="1" max="5" placeholder="Temagenomförande (1-5)">
<input id="environment" type="number" min="1" max="5" placeholder="Miljö (1-5)">

<button onclick="sendVote()">Rösta 🍷</button>
</div>

<div id="results"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyCRhm3_YarCldLnFFsD3dr_efZ2_r-GIFB6QBhZjPakfXFbPLBGPBxToUB_4fSe5Y/exec";

// ✅ validering 1-5
function validateInputs(taste, theme, environment){
  if(
    taste < 1 || taste > 5 ||
    theme < 1 || theme > 5 ||
    environment < 1 || environment > 5
  ){
    alert("Alla betyg måste vara mellan 1–5!");
    return false;
  }
  return true;
}

// ✅ rösta
function sendVote(){

  let title = document.getElementById("title").value;
  let name = document.getElementById("name").value;

  if(!title || !name){
    alert("Fyll i tema och namn!");
    return;
  }

  fetch(API_URL)
  .then(res => res.text())
  .then(text => {

    let votes = [];

    try {
      votes = JSON.parse(text);
    } catch {
      votes = [];
    }

    // ✅ stopp för dubbelröst
    let alreadyVoted = votes.some(v =>
      v.title.toLowerCase() === title.toLowerCase() &&
      v.name.toLowerCase() === name.toLowerCase()
    );

    if(alreadyVoted){
      alert("❌ Du har redan röstat på denna kväll!");
      return;
    }

    let taste = Number(document.getElementById("taste").value);
    let theme = Number(document.getElementById("theme").value);
    let environment = Number(document.getElementById("environment").value);

    if(!validateInputs(taste, theme, environment)) return;

    let data = {
      title,
      host: document.getElementById("host").value,
      name,
      taste,
      theme,
      environment
    };

    // ✅ mobil-säker fetch
    fetch(API_URL + "?data=" + encodeURIComponent(JSON.stringify(data)))
      .then(() => loadData())
      .catch(err => alert("Fel vid röstning: " + err));

  });
}

// ✅ hämta data
function loadData(){
  fetch(API_URL)
  .then(res => res.text())
  .then(text => {
    try {
      let data = JSON.parse(text);
      render(data);
    } catch {
      console.log("Ingen data ännu");
      render([]);
    }
  })
  .catch(err => {
    console.log("Fel:", err);
    render([]);
  });
}

// ✅ visa liga
function render(votes){

  if(!votes || votes.length === 0){
    document.getElementById("results").innerHTML =
      "<div class='box'>Inga röster ännu 🍷</div>";
    return;
  }

  let grouped = {};

  votes.forEach(v => {

    if(!grouped[v.title]){
      grouped[v.title] = {
        host: v.host,
        scores: []
      };
    }

    let avg = (Number(v.taste) + Number(v.theme) + Number(v.environment)) / 3;
    grouped[v.title].scores.push(avg);
  });

  let result = [];

  for(let key in grouped){
    let scores = grouped[key].scores;

    let total = scores.reduce((a,b)=>a+b,0);
    let avg = total / scores.length;

    result.push({
      title: key,
      host: grouped[key].host,
      avg,
      votes: scores.length
    });
  }

  result.sort((a,b)=>b.avg - a.avg);

  let container = document.getElementById("results");
  container.innerHTML = "";

  result.forEach((r, i) => {

    let div = document.createElement("div");
    div.className = "box";

    if(i === 0){
      div.classList.add("winner");
      div.innerHTML += "🏆 VINNARE<br>";
    }

    div.innerHTML += `
      <h3>${r.title}</h3>
      <p>Arrangör: ${r.host}</p>
      <p>⭐ Snitt: ${r.avg.toFixed(2)}</p>
      <p>👥 Antal röster: ${r.votes}</p>
    `;

    container.appendChild(div);
  });
}

// ✅ ladda vid start
loadData();

</script>

</body>
</html>
